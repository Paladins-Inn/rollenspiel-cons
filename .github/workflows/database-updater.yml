# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: CI Database Update OCI Container

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/main/resources/db/**'
      - `.github/workflows/database-updater.yml`
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: quay.io
  IMAGE_NAME: paladinsinn/${{ github.event.repository.name }}

jobs:
  build-and-publish:
    name: Build with Maven & Push Container
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Set up Maven Settings
      uses: s4u/maven-settings-action@v4.0.0
      with:
        servers: |
          [
            { "id": "nvdApi", "username": "klenkes74", "password": "${{ secrets.NVD_API_KEY }}"},
            { "id": "torganized-play-commons", "username": "${{ secrets.ARTIFACTSTORE_USER }}", "password": "${{ secrets.ARTIFACTSTORE_PASSWORD }}"}
          ]

    - name: Build Java
      run: mvn -U --batch-mode --no-transfer-progress process-resources -DskipTests
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Login to Quay.io
      uses: docker/login-action@v3
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_ORG_USER }}
        password: ${{ secrets.QUAY_ORG_TOKEN }}

    - name: Build and push OCI Container
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.database-updater
        platforms: linux/amd64
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:db-updater-${{ env.RELEASE_VERSION }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:db-updater-${{ env.RELEASE_VERSION }}-${{ env.SHORT_SHA }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:db-updater-latest
        outputs: type=image,name=target
