# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: CI/CD OCI Container

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/dependabot.yml'
      - '.github/workflows/release.yml'
      - 'src/main/helm/**'
      - 'src/main/kubernetes/**'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'README.md'
      - 'SECURITY.md'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: quay.io
  IMAGE_NAME: paladinsinn/${{ github.event.repository.name }}

jobs:
  build-and-publish:
    name: Build with Maven & Push Container
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Set up Maven Settings
      uses: s4u/maven-settings-action@v4.0.0
      with:
        servers: |
          [
            { "id": "nvdApi", "username": "klenkes74", "password": "${{ secrets.NVD_API_KEY }}"},
            { "id": "torganized-play-commons", "username": "${{ secrets.ARTIFACTSTORE_USER }}", "password": "${{ secrets.ARTIFACTSTORE_PASSWORD }}"}
          ]

    - name: Get current POM Version
      run: |
        POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        SHORT_SHA=$(git rev-parse --short HEAD)
        echo "RELEASE_VERSION=${POM_VERSION}" >> $GITHUB_ENV
        echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV

    - name: Create `./local.properties`
      run: |
        APP_AES256_KEY=$(openssl rand -base64 32)
        echo "APP_AES256_KEY=${APP_AES256_KEY}" >> $GITHUB_ENV
        cat > local.properties <<'EOF'
        spring.datasource.url=jdbc:h2:mem:testdb
        spring.datasource.driverClassName=org.h2.Driver
        spring.datasource.username=sa
        spring.datasource.password=sa
        app.aes256.key=${APP_AES256_KEY}
        what3words.api.key=${WHAT3WORDS_API_KEY}
        geocoding.api.key=${GEOCODING_API_KEY}
        EOF
      shell: bash
      env:
        WHAT3WORDS_API_KEY: ${{ secrets.WHAT3WORDS_API_KEY }}
        GEOCODING_API_KEY: ${{ secrets.GEOCODING_API_KEY }}

    - name: Build Java
      run: mvn package -U --batch-mode --no-transfer-progress
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        APP_AES256_KEY: ${{ env.APP_AES256_KEY }}

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6

    - name: Login to Quay.io
      uses: docker/login-action@v3
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_ORG_USER }}
        password: ${{ secrets.QUAY_ORG_TOKEN }}

    - name: Build and push OCI Container
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:${{ env.RELEASE_VERSION }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:${{ env.RELEASE_VERSION }}-${{ env.SHORT_SHA }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:latest
        outputs: type=image,name=target
    
    - name: Build and push DB Updater OCI Container
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.database-updater
        platforms: linux/amd64
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:db-updater-${{ env.RELEASE_VERSION }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:db-updater-${{ env.RELEASE_VERSION }}-${{ env.SHORT_SHA }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:db-updater-latest
        outputs: type=image,name=target
