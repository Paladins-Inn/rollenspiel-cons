# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Release Version

on:
  workflow_dispatch:
    inputs:
      release_as:
        description: "Version bump (auto|patch|minor|major)"
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
        default: auto
        required: false
env:
  REGISTRY: quay.io
  IMAGE_NAME: paladinsinn/${{ github.event.repository.name }}

jobs:
  release-and-build:
    name: Build, Release and Snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
      issues: write
      pull-requests: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Set up Maven Settings
      uses: s4u/maven-settings-action@v4.0.0
      with:
        servers: |
          [
            { "id": "nvdApi", "username": "klenkes74", "password": "${{ secrets.NVD_API_KEY }}"},
            { "id": "torganized-play-commons", "username": "${{ secrets.ARTIFACTSTORE_USER }}", "password": "${{ secrets.ARTIFACTSTORE_PASSWORD }}"}
          ]

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "24"

    - name: Generate Changelog and next Version
      run: |
        npm install
        RELEASE_AS="${{ github.event.inputs.release_as || 'auto' }}"
        if [ "$RELEASE_AS" = "auto" ]; then
          npx --yes commit-and-tag-version --skip.commit --skip.tag
        else
          npx --yes commit-and-tag-version --release-as "$RELEASE_AS" --skip.commit --skip.tag
        fi
    
        VERSION=$(node -p "require('./package.json').version")
        echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
    
        npx --yes conventional-changelog-cli -p angular -r 2 > release-notes.md
    
    - name: Set project.version in pom.xml
      run: |
        mvn versions:set -U --batch-mode --no-transfer-progress -DnewVersion=${{ env.RELEASE_VERSION }} -DgenerateBackupPoms=false

    - name: Create `./local.properties`
      run: |
        APP_AES256_KEY=$(openssl rand -base64 32)
        echo "APP_AES256_KEY=${APP_AES256_KEY}" >> $GITHUB_ENV
        cat > local.properties <<'EOF'
        spring.datasource.url=jdbc:h2:mem:testdb
        spring.datasource.driverClassName=org.h2.Driver
        spring.datasource.username=sa
        spring.datasource.password=sa
        app.aes256.key=${APP_AES256_KEY}
        what3words.api.key=${WHAT3WORDS_API_KEY}
        geocoding.api.key=${GEOCODING_API_KEY}
        EOF
      shell: bash

    - name: Build Java
      run: mvn package -U --batch-mode --no-transfer-progress
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        APP_AES256_KEY: ${{ env.APP_AES256_KEY }}

    - name: Login to Quay.io
      uses: docker/login-action@v3
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_ORG_USER }}
        password: ${{ secrets.QUAY_ORG_TOKEN }}

    - name: Build and push OCI Container
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:${{ env.RELEASE_VERSION }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:latest
        outputs: type=image,name=target

    - name: Commit Release, Tag and Push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add package.json package-lock.json CHANGELOG.md pom.xml
        git commit -m "chore(release): ${{ env.RELEASE_VERSION }} [skip ci]"
        git tag -a v${{ env.RELEASE_VERSION }} -m "Release v${{ env.RELEASE_VERSION }}"
        git push origin main
        git push origin v${{ env.RELEASE_VERSION }}

    - name: Create Github Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create v${{ env.RELEASE_VERSION }} --title "v${{ env.RELEASE_VERSION }}" -F release-notes.md

    - name: Bump to next Snapshot
      run: |
        mvn build-helper:parse-version versions:set \
          -DnewVersion=\${parsedVersion.majorVersion}.\${parsedVersion.minorVersion}.\${parsedVersion.nextIncrementalVersion}-SNAPSHOT \
          -DgenerateBackupPoms=false
        git add pom.xml
        git commit -m "chore(release): prepare for next development iteration [skip ci]"
        git push origin main
